version: 2.1

parameters:
  GHA_Action:
    type: string
    default: ""
  should_release:
    type: boolean
    default: false

orbs:
  macos: circleci/macos@2.5.4
  android: circleci/android@3.2.0
  codecov: codecov/codecov@5.4.3

executors:
  base:
    docker:
      - image: docker.io/playerui/bazel-docker:13
    working_directory: ~/player
    resource_class: xlarge
    environment:
      TZ: "/usr/share/zoneinfo/America/Los_Angeles"
  minimal:
    docker:
      - image: cimg/base:current
    working_directory: ~/player
    resource_class: medium
    environment:
      TZ: "/usr/share/zoneinfo/America/Los_Angeles"
  ios:
    working_directory: ~/player
    resource_class: m4pro.medium
    macos:
      xcode: 16.4.0
    environment:
      TZ: "/usr/share/zoneinfo/America/Los_Angeles"
  android:
    machine:
      image: android:2024.04.1
    working_directory: ~/player
    resource_class: xlarge
    environment:
      TZ: "/usr/share/zoneinfo/America/Los_Angeles"
  benchmarks:
    docker:
      - image: docker.io/playerui/bazel-docker:13
    working_directory: ~/player
    resource_class: large
    environment:
      TZ: "/usr/share/zoneinfo/America/Los_Angeles"

commands:
  setup_auth:
    description: Configure authentication for deployments
    steps:
      - add_ssh_keys:
          fingerprints:
            - "SHA256:hUAWVYdfSW5ml6ufbfyEHUcuPwUJ88xVhsZc21b2lA8"
      - run: mkdir -p ~/.ssh/ && echo -e "Host github.com\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
      - run: git config --global user.name "Intuit Service"
      - run: git config --global user.email "opensource-svc@intuit.com"

  auto_shipit:
    description: Perform Auto shipit
    steps:
      - attach_workspace:
          at: ~/player
      - setup_auth
      - run: echo "//registry.npmjs.com/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - run: |
          echo -e $GPG_KEY | gpg --import --batch
          echo -e "pinentry-mode loopback\npassphrase $DEPLOY_MAVEN_GPG_PASSPHRASE" > ~/.gnupg/gpg.conf
      - run:
          command: |
            source ~/.bashrc
            bundle install
            npx auto shipit -vv --only-graduate-with-release-label
          no_output_timeout: 40m

jobs:
  setup:
    executor: minimal
    steps:
      - checkout:
          method: full

      - persist_to_workspace:
          root: .
          paths:
            - .

  bazelrc:
    executor: minimal
    steps:
      - attach_workspace:
          at: ~/player
      - run: |
          echo "build --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}" >> .bazelrc.local
          echo "test --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}" >> .bazelrc.local
          echo "coverage --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}" >> .bazelrc.local
          echo "common --remote_upload_local_results" >> .bazelrc.local
      - persist_to_workspace:
          root: .
          paths:
            - .
  
  bazelrc_fork:
    executor: minimal
    steps:
      - attach_workspace:
          at: ~/player
      - run: |
          echo "build --bes_results_url=''" >> .bazelrc.local
          echo "build --bes_backend=''" >> .bazelrc.local
          echo "build --remote_cache=''" >> .bazelrc.local
          echo "test --bes_results_url=''" >> .bazelrc.local
          echo "test --bes_backend=''" >> .bazelrc.local
          echo "test --remote_cache=''" >> .bazelrc.local
          echo "coverage --bes_results_url=''" >> .bazelrc.local
          echo "coverage --bes_backend=''" >> .bazelrc.local
          echo "coverage --remote_cache=''" >> .bazelrc.local
      - persist_to_workspace:
          root: .
          paths:
            - .

  build:
    executor: base
    steps:
      - attach_workspace:
          at: ~/player

      - run: bazel build --config=ci -- $(bazel query 'filter("native_bundle$", //...)')

      - persist_to_workspace:
          root: .
          paths:
            - .

  build_and_test_ios:
    executor: ios
    steps:
      - attach_workspace:
          at: ~/player

      - run:
          name: Homebrew Dependencies
          command: |
            HOMEBREW_NO_AUTO_UPDATE=1 brew install bazelisk lcov

      - macos/preboot-simulator:
          version: "18.5"
          platform: "iOS"
          device: "iPhone 16 Pro"

      - run: bazel build --config=ci-mac -- //ios/demo:PlayerUIDemo

      - run:
          name: Test Prebuild
          command: |
            bazel build \
              --config=ci-mac \
              $(bazel query "kind(ios_unit_test, //ios/...)") \
              $(bazel query "kind(ios_unit_test, //plugins/...)") \
              $(bazel query "kind(ios_ui_test, //ios/...)") \
              $(bazel query "kind(ios_ui_test, //plugins/...)") \
              $(bazel query "attr(name, '.*SwiftLint', //ios/...)") \
              $(bazel query "attr(name, '.*SwiftLint', //plugins/...)")
      - run:
          name: Tests
          command: |
            bazel coverage \
              --config=ci-mac \
              --jobs=1 \
              --experimental_use_llvm_covmap \
              --test_output=all \
              --test_timeout=1800 \
              --instrument_test_targets \
              --instrumentation_filter="-/ViewInspector[/:],-Tests[/:]" \
              $(bazel query "kind(ios_unit_test, //ios/...)") \
              $(bazel query "kind(ios_unit_test, //plugins/...)") \
              $(bazel query "kind(ios_ui_test, //ios/...)") \
              $(bazel query "kind(ios_ui_test, //plugins/...)")
      - run:
          name: Lint
          command: |
            bazel test \
              --config=ci-mac \
              $(bazel query "attr(name, '.*SwiftLint', //ios/...)") \
              $(bazel query "attr(name, '.*SwiftLint', //plugins/...)")

      - run:
          when: always
          command: |
            RESULTS_DIR=_test_results
            find -L ./bazel-testlogs -name test.xml | while read line
            do
              mkdir -p $RESULTS_DIR/$(dirname $line)
              cp $line $RESULTS_DIR/$(dirname $line)
            done

      - run:
          name: Collect iOS coverage
          when: always
          command: |
            mkdir -p coverage
            cp ./bazel-out/_coverage/_coverage_report.dat coverage/ios_coverage.dat

      - persist_to_workspace:
          root: .
          paths:
            - coverage/ios_coverage.dat

      - store_test_results:
          path: _test_results

  test:
    executor: base
    steps:
      - attach_workspace:
          at: ~/player

      - run: bazel build --config=ci -- $(bazel query 'kind(".*_test", //...) except filter("ios|swiftui", //...)') -//android/demo:android_instrumentation_test

      - run: bazel test --config=ci -- $(bazel query 'kind(".*_test", //...) except filter("ios|swiftui", //...)') -//android/demo:android_instrumentation_test

      - run: bazel coverage --config=ci -- $(bazel query 'kind(".*_test", //...) except filter("ios|swiftui", //...)') -//android/demo:android_instrumentation_test

      - run:
          when: always
          command: |
            RESULTS_DIR=_test_results
            find -L ./bazel-testlogs -name test.xml | while read line
            do
              mkdir -p $RESULTS_DIR/$(dirname $line)
              cp $line $RESULTS_DIR/$(dirname $line)
            done

      - run:
          name: Collect JS/JVM coverage
          when: always
          command: |
            mkdir -p coverage
            cp ./bazel-out/_coverage/_coverage_report.dat coverage/js_jvm_coverage.dat

      - persist_to_workspace:
          root: .
          paths:
            - coverage/js_jvm_coverage.dat

      - store_test_results:
          path: _test_results

  upload_coverage:
    executor: minimal
    steps:
      - attach_workspace:
          at: ~/player

      - codecov/upload:
          files: coverage/ios_coverage.dat,coverage/js_jvm_coverage.dat

  android_test:
    executor: android
    steps:
      - checkout:
          method: full

      - attach_workspace:
          at: ~/player

      - run:
          name: Install Bazel
          command: |
            wget -q https://github.com/bazelbuild/bazelisk/releases/download/v1.11.0/bazelisk-linux-amd64 -O bazelisk && \
            chmod +x bazelisk && \
            sudo mkdir /opt/bazelisk-v1.11.0 && \
            sudo mv bazelisk /opt/bazelisk-v1.11.0 && \
            sudo ln -s /opt/bazelisk-v1.11.0/bazelisk /usr/local/bin/bazel

      - run: ./scripts/android-ci-bazel-test.sh //android/demo:android_instrumentation_test

      - run:
          when: always
          command: |
            RESULTS_DIR=_test_results
            find -L ./bazel-testlogs -name test.xml | while read line
            do
              mkdir -p $RESULTS_DIR/$(dirname $line)
              cp $line $RESULTS_DIR/$(dirname $line)
            done

      - store_test_results:
          path: _test_results

      - store_artifacts:
          path: screenshots

  bundle_analyze:
    executor: base
    steps:
      - attach_workspace:
          at: ~/player

      - run: ./scripts/bundle-analyze.sh

  maybe_release:
    executor: base
    steps:
      - attach_workspace:
          at: ~/player
      - run: echo "Should I release? (<< pipeline.parameters.should_release >>)"
      - when:
          condition: << pipeline.parameters.should_release >>
          steps:
            - auto_shipit

  build_and_deploy_docs_preview:
    executor: benchmarks
    steps:
      - attach_workspace:
          at: ~/player
      - setup_auth
      - run:
          name: Check if docs should run
          command: |
            # Skip docs for release-main branches (placeholder PRs)
            if [[ "$CIRCLE_BRANCH" =~ ^release-main ]]; then
              echo "Skipping docs for release-main branch"
              exit 0
            fi

            # Check if docs should build and deploy
            if [ "<< pipeline.parameters.GHA_Action >>" = "docs" ] || [ "<< pipeline.parameters.should_release >>" = "true" ]; then
              echo "Docs build/deploy will proceed"
            else
              echo "Skipping docs - not requested"
              circleci-agent step halt
            fi

      - run:
          name: Build docs
          command: |
            echo "Building docs for << pipeline.parameters.GHA_Action >>"
            bazel build --config=release //docs:gh_deploy
            echo "Docs built successfully"

      - run:
          name: Deploy preview docs
          command: |
            echo "Deploying PR preview docs (next/release docs handled by release-docs.js script)"
            ./scripts/docs/preview-docs.sh "<< pipeline.parameters.GHA_Action >>"

  build_docs:
    executor: benchmarks
    steps:
      - attach_workspace:
          at: ~/player
      - run:
          name: Build docs
          command: |
            echo "Building docs for release"
            bazel build --config=release //docs:gh_deploy
            echo "Docs built successfully"

  release:
    executor: base
    steps:
      - attach_workspace:
          at: ~/player
      - auto_shipit

  bench_js:
    executor: benchmarks
    steps:
      - attach_workspace:
          at: ~/player

      - run: |
          bazel query 'filter(".*_vitest_bench$", //...)' --output label 2>/dev/null | tr '\n' ' ' | xargs -r -n 1 bazel run --config=ci-benchmark

workflows:
  build_and_test_pr:
    jobs:
      - setup:
          filters:
            branches:
              ignore:
                - main
                - /version-.*/
            tags:
              ignore: /.*/
      - bazelrc:
          filters:
            branches:
              ignore:
                - /pull\/.*/
          context:
            - Build
          requires:
            - setup

      - bazelrc_fork:
          filters:
            branches:
              only:
                - /pull\/.*/
          requires:
            - setup

      - build:
          name: build-trunk
          filters:
            branches:
              ignore:
                - /pull\/.*/
          requires:
            - bazelrc

      - build:
          name: build-fork
          filters:
            branches:
              only:
                - /pull\/.*/
          requires:
            - setup
            - bazelrc_fork

      - build_and_test_ios:
          name: build-ios-trunk
          filters:
            branches:
              ignore:
                - /pull\/.*/
          requires:
            - bazelrc
            - build-trunk

      - build_and_test_ios:
          name: build-ios-fork
          filters:
            branches:
              only:
                - /pull\/.*/
          requires:
            - build-fork
            - bazelrc_fork

      - maybe_release:
          filters:
            branches:
              ignore:
                - /pull\/.*/
          context:
            - Publish
          requires:
            - test-trunk
            - build-ios-trunk
            - android-test-trunk

      - test:
          name: test-trunk
          filters:
            branches:
              ignore:
                - /pull\/.*/
          requires:
            - build-trunk

      - test:
          name: test-fork
          filters:
            branches:
              only:
                - /pull\/.*/
          requires:
            - build-fork

      - android_test:
          name: android-test-trunk
          filters:
            branches:
              ignore:
                - /pull\/.*/
          context:
            - Build
          requires:
            - build-trunk

      - android_test:
          name: android-test-fork
          context:
            - BuildFork
          filters:
            branches:
              only:
                - /pull\/.*/
          requires:
            - build-fork

      - upload_coverage:
          name: upload-coverage-trunk
          filters:
            branches:
              ignore:
                - /pull\/.*/
          requires:
            - test-trunk
            - build-ios-trunk

      - upload_coverage:
          name: upload-coverage-fork
          filters:
            branches:
              only:
                - /pull\/.*/
          requires:
            - test-fork
            - build-ios-fork

      - bundle_analyze:
          name: bundle-analyze-trunk
          filters:
            branches:
              ignore:
                - /pull\/.*/
          requires:
            - test-trunk

      - bench_js:
          name: js-benchmark-tests-trunk
          filters:
            branches:
              ignore:
                - /pull\/.*/
          requires:
            - build-trunk

      - bench_js:
          name: js-benchmark-tests-fork
          filters:
            branches:
              only:
                - /pull\/.*/
          requires:
            - build-fork

      - build_and_deploy_docs_preview:
          name: preview-docs-trunk
          context:
            - Publish
          filters:
            branches:
              ignore:
                - /pull\/.*/
          requires:
            - test-trunk

  build_and_test_main:
    when:
      equal: ["", << pipeline.parameters.GHA_Action >>]
    jobs:
      - setup:
          filters:
            branches:
              only:
                - main
                - /version-.*/
      - bazelrc:
          context:
            - Build
          requires:
            - setup

      - build:
          requires:
            - bazelrc

      - build_and_test_ios:
          requires:
            - build

      - android_test:
          context:
            - Build
          requires:
            - build

      - test:
          requires:
            - build
            - build_and_test_ios

      - upload_coverage:
          requires:
            - test

      - bundle_analyze:
          name: bundle-analyze
          requires:
            - test

      - build_docs:
          context:
            - Publish
          requires:
            - test

      - release:
          context:
            - Publish
          requires:
            - android_test
            - test
            - bundle-analyze
            - build_and_test_ios
            - build_docs

  full_release:
    when:
      equal: [release, << pipeline.parameters.GHA_Action >>]
    jobs:
      - setup

      - bazelrc:
          context:
            - Build
          requires:
            - setup

      - build:
          requires:
            - setup

      - build_and_test_ios:
          requires:
            - bazelrc

      - android_test:
          context:
            - Build
          requires:
            - build

      - test:
          requires:
            - build

      - upload_coverage:
          requires:
            - test

      - bundle_analyze:
          name: bundle-analyze
          requires:
            - test

      - build_docs:
          context:
            - Publish
          requires:
            - test

      - release:
          context:
            - Publish
          requires:
            - android_test
            - test
            - bundle_analyze
            - build_and_test_ios
            - build_docs
